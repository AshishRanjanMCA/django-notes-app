name: Django CI

on: 
  push:
    branches:
      - main
jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          python-version: "3.11"
      - name: Install Dependenciess
        run: |
          pip install -r requirements.txt
      - name: Run Django Tests
        run: |
          python manage.py test
